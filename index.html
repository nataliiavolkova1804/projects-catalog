<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог проектов компании</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Каталог проектов компании</h1>
    </header>
    
    <main>
        <section class="search-section">
            <input type="text" placeholder="Поиск проектов..." id="searchInput">
            <select id="categoryFilter">
                <option value="">Все категории</option>
            </select>
            <select id="sortSelect">
                <option value="name-asc">По имени (А-Я)</option>
                <option value="name-desc">По имени (Я-А)</option>
                <option value="year-desc">Сначала новые</option>
                <option value="year-asc">Сначала старые</option>
            </select>
        </section>
        
        <div class="results-info" id="resultsInfo">
            Найдено проектов: <span id="resultsCount">0</span>
        </div>
        
        <section class="projects-grid" id="projectsContainer">
            <!-- Карточки проектов будут здесь -->
        </section>
    </main>

        <!-- Модальное окно -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
            <div class="modal-details">
                <p><strong>Клиент:</strong> <span id="modalClient"></span></p>
                <p><strong>Год:</strong> <span id="modalYear"></span></p>
                <p><strong>Статус:</strong> <span id="modalStatus"></span></p>
                <p><strong>Стек технологий:</strong> <span id="modalStack"></span></p>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
